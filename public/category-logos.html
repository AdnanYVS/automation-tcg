<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kategori Logoları · Card Dünyası</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0c0f14;
      --surface: #1a2230;
      --surface-hover: #212b3c;
      --border: rgba(255, 255, 255, 0.08);
      --text: #f0f4f8;
      --muted: #8b9cb3;
      --accent: #ffcb05;
      --accent-text: #1a1400;
      --success: #34d399;
      --error: #f87171;
      --radius: 16px;
      --radius-sm: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    .app {
      max-width: 1400px;
      margin: 0 auto;
      padding: 28px 20px 60px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .brand { display: flex; gap: 14px; align-items: center; }
    .brand-icon {
      width: 48px; height: 48px; border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), #ff9500);
      display: grid; place-items: center; font-size: 1.4rem;
    }
    .brand h1 { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800; }
    .brand p { color: var(--muted); font-size: 0.88rem; margin-top: 2px; }

    .header-actions, .toolbar, .filters {
      display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
    }

    .btn, .nav-link, .filter-btn {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      border-radius: 999px;
      padding: 8px 14px;
      font: inherit;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      text-decoration: none;
    }

    .btn:hover, .filter-btn:hover, .nav-link:hover { background: var(--surface-hover); }
    .btn-primary { background: linear-gradient(135deg, var(--accent), #ffb800); color: var(--accent-text); border: none; }
    .btn-success { background: rgba(52, 211, 153, 0.15); color: var(--success); border-color: rgba(52, 211, 153, 0.3); }
    .btn-danger { background: rgba(248, 113, 113, 0.12); color: var(--error); border-color: rgba(248, 113, 113, 0.3); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }

    .stat-label { color: var(--muted); font-size: 0.76rem; text-transform: uppercase; letter-spacing: 0.04em; }
    .stat-value { font-size: 1.5rem; font-weight: 700; margin-top: 6px; }

    .toast {
      display: none;
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      margin-bottom: 16px;
      font-weight: 500;
    }
    .toast.visible { display: block; }
    .toast.info { background: rgba(59, 130, 246, 0.12); color: #93c5fd; }
    .toast.success { background: rgba(52, 211, 153, 0.12); color: var(--success); }
    .toast.error { background: rgba(248, 113, 113, 0.12); color: var(--error); }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.15s, transform 0.15s;
    }

    .card.selected { border-color: rgba(255, 203, 5, 0.5); }
    .card:hover { transform: translateY(-2px); }

    .card-image {
      aspect-ratio: 4 / 3;
      background: #0a0d12;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .card-image img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 12px;
    }

    .card-image .missing {
      color: var(--muted);
      font-size: 0.85rem;
      text-align: center;
      padding: 16px;
    }

    .card-body { padding: 14px; }
    .card-title { font-size: 0.92rem; font-weight: 600; min-height: 2.8em; }
    .card-meta { color: var(--muted); font-size: 0.78rem; margin-top: 8px; }

    .tag {
      display: inline-flex;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 700;
      margin-top: 8px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--muted);
    }

    .tag.pending { color: var(--accent); background: rgba(255, 203, 5, 0.12); }
    .tag.approved { color: var(--success); background: rgba(52, 211, 153, 0.12); }
    .tag.rejected { color: var(--error); background: rgba(248, 113, 113, 0.12); }
    .tag.uploaded { color: #93c5fd; background: rgba(59, 130, 246, 0.12); }
    .tag.failed { color: var(--error); background: rgba(248, 113, 113, 0.12); }
    .tag.missing { color: var(--muted); }

    .card-check {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 60px 20px;
      grid-column: 1 / -1;
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="brand">
        <div class="brand-icon">🖼️</div>
        <div>
          <h1>Kategori Logoları</h1>
          <p>KartFiyat set logolarını önizle, onayla, ikas'a yükle</p>
        </div>
      </div>
      <div class="header-actions">
        <a href="/" class="nav-link">← Kart Arama</a>
        <button type="button" class="btn" id="refresh-btn">Yenile</button>
      </div>
    </header>

    <div class="toast" id="toast"></div>

    <section class="stats" id="stats"></section>

    <div class="toolbar" style="margin-bottom: 14px;">
      <button type="button" class="btn btn-success" id="approve-selected-btn">Seçilenleri Onayla</button>
      <button type="button" class="btn btn-success" id="approve-all-btn">Tümünü Onayla</button>
      <button type="button" class="btn btn-danger" id="reject-selected-btn">Seçilenleri Reddet</button>
      <button type="button" class="btn btn-primary" id="upload-btn">Onaylıları ikas'a Yükle</button>
    </div>

    <div class="filters" id="filters" style="margin-bottom: 18px;">
      <button type="button" class="filter-btn active" data-filter="all">Tümü</button>
      <button type="button" class="filter-btn" data-filter="pending">Bekleyen</button>
      <button type="button" class="filter-btn" data-filter="approved">Onaylı</button>
      <button type="button" class="filter-btn" data-filter="uploaded">Yüklenen</button>
      <button type="button" class="filter-btn" data-filter="missing">Görsel Yok</button>
    </div>

    <div class="grid" id="grid">
      <div class="empty">Logolar yükleniyor...</div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script>
    const toastEl = document.getElementById('toast');
    const statsEl = document.getElementById('stats');
    const gridEl = document.getElementById('grid');
    const filtersEl = document.getElementById('filters');

    let previewData = null;
    let currentFilter = 'all';
    const selectedIds = new Set();

    function showToast(message, type = 'info') {
      toastEl.textContent = message;
      toastEl.className = `toast visible ${type}`;
      clearTimeout(showToast._timer);
      showToast._timer = setTimeout(() => toastEl.classList.remove('visible'), 5000);
    }

    function escapeHtml(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function statusLabel(status) {
      const map = {
        pending: 'Bekliyor',
        approved: 'Onaylı',
        rejected: 'Reddedildi',
        uploaded: 'Yüklendi',
        failed: 'Hata',
        missing: 'Görsel yok',
      };
      return map[status] || status;
    }

    function renderStats() {
      if (!previewData) return;
      const s = previewData.summary;
      statsEl.innerHTML = `
        <div class="stat-card"><div class="stat-label">Toplam Set</div><div class="stat-value">${s.totalIkasSets}</div></div>
        <div class="stat-card"><div class="stat-label">KartFiyat Görseli</div><div class="stat-value">${s.withKartfiyatImage}</div></div>
        <div class="stat-card"><div class="stat-label">Bekleyen</div><div class="stat-value">${s.pending}</div></div>
        <div class="stat-card"><div class="stat-label">Onaylı</div><div class="stat-value">${s.approved}</div></div>
        <div class="stat-card"><div class="stat-label">Yüklenen</div><div class="stat-value">${s.uploaded}</div></div>
        <div class="stat-card"><div class="stat-label">Görsel Yok</div><div class="stat-value">${s.missingKartfiyatImage}</div></div>
      `;
    }

    function getFilteredItems() {
      if (!previewData) return [];
      if (currentFilter === 'all') return previewData.items;
      if (currentFilter === 'missing') return previewData.items.filter((item) => !item.hasImage);
      return previewData.items.filter((item) => item.status === currentFilter);
    }

    function renderGrid() {
      const items = getFilteredItems();
      if (!items.length) {
        gridEl.innerHTML = '<div class="empty">Bu filtrede kategori yok.</div>';
        return;
      }

      gridEl.innerHTML = items.map((item) => `
        <article class="card ${selectedIds.has(item.ikasCategoryId) ? 'selected' : ''}" data-id="${escapeHtml(item.ikasCategoryId)}">
          <div class="card-image">
            ${item.imageUrl
              ? `<img src="${escapeHtml(item.imageUrl)}" alt="${escapeHtml(item.ikasCategoryName)}" loading="lazy">`
              : '<div class="missing">KartFiyat görseli bulunamadı</div>'}
          </div>
          <div class="card-body">
            <div class="card-title">${escapeHtml(item.ikasCategoryName)}</div>
            <div class="card-meta">${item.kartfiyatCategoryId ? `KF #${item.kartfiyatCategoryId}` : 'Eşleşme yok'}</div>
            <span class="tag ${escapeHtml(item.status)}">${statusLabel(item.status)}</span>
            ${item.hasImage ? `
              <label class="card-check">
                <input type="checkbox" data-id="${escapeHtml(item.ikasCategoryId)}" ${selectedIds.has(item.ikasCategoryId) ? 'checked' : ''}>
                Seç
              </label>
            ` : ''}
          </div>
        </article>
      `).join('');

      gridEl.querySelectorAll('input[type="checkbox"]').forEach((input) => {
        input.addEventListener('change', () => {
          const id = input.dataset.id;
          if (input.checked) selectedIds.add(id);
          else selectedIds.delete(id);
          input.closest('.card')?.classList.toggle('selected', input.checked);
        });
      });
    }

    async function loadPreview() {
      showToast('KartFiyat logoları çekiliyor...', 'info');
      const response = await AUTH.apiFetch('/api/category-logos/preview');
      const payload = await response.json();
      if (!response.ok || !payload.success) throw new Error(payload.error || 'Önizleme yüklenemedi.');
      previewData = payload.data;
      renderStats();
      renderGrid();
      showToast(`${previewData.summary.withKartfiyatImage} set logosu hazır`, 'success');
    }

    async function approveSelected() {
      const ids = [...selectedIds];
      if (!ids.length) return showToast('Önce logo seçin', 'error');

      const response = await AUTH.apiFetch('/api/category-logos/approve', {
        method: 'POST',
        body: JSON.stringify({ categoryIds: ids }),
      });
      const payload = await response.json();
      if (!response.ok || !payload.success) throw new Error(payload.error || 'Onay başarısız.');
      previewData = payload.data;
      selectedIds.clear();
      renderStats();
      renderGrid();
      showToast(`${ids.length} kategori onaylandı`, 'success');
    }

    async function approveAll() {
      if (!confirm('Görseli olan tüm kategoriler onaylansın mı?')) return;

      const response = await AUTH.apiFetch('/api/category-logos/approve', {
        method: 'POST',
        body: JSON.stringify({ approveAll: true }),
      });
      const payload = await response.json();
      if (!response.ok || !payload.success) throw new Error(payload.error || 'Toplu onay başarısız.');
      previewData = payload.data.preview;
      selectedIds.clear();
      renderStats();
      renderGrid();
      showToast(`${payload.data.approvedCount} kategori onaylandı`, 'success');
    }

    async function rejectSelected() {
      const ids = [...selectedIds];
      if (!ids.length) return showToast('Önce logo seçin', 'error');

      const response = await AUTH.apiFetch('/api/category-logos/reject', {
        method: 'POST',
        body: JSON.stringify({ categoryIds: ids }),
      });
      const payload = await response.json();
      if (!response.ok || !payload.success) throw new Error(payload.error || 'Red başarısız.');
      previewData = payload.data;
      selectedIds.clear();
      renderStats();
      renderGrid();
      showToast(`${ids.length} kategori reddedildi`, 'success');
    }

    async function uploadApproved() {
      const approvedCount = previewData?.summary?.approved || 0;
      const failedCount = previewData?.summary?.failed || 0;
      if (!approvedCount && !failedCount) {
        return showToast('Yüklenecek onaylı logo yok', 'error');
      }
      if (!confirm(`${approvedCount + failedCount} onaylı logo ikas'a yüklensin mi?`)) return;

      const uploadBtn = document.getElementById('upload-btn');
      uploadBtn.disabled = true;
      showToast('Logolar ikas\'a yükleniyor... Bu birkaç dakika sürebilir.', 'info');

      try {
        const response = await AUTH.apiFetch('/api/category-logos/upload', { method: 'POST' });
        const payload = await response.json();
        if (!response.ok || !payload.success) throw new Error(payload.error || 'Yükleme başarısız.');
        previewData = payload.data.preview;
        renderStats();
        renderGrid();
        const stats = payload.data.stats;
        showToast(`Yükleme tamam: ${stats.uploaded} başarılı, ${stats.failed} hata`, stats.failed ? 'error' : 'success');
      } finally {
        uploadBtn.disabled = false;
      }
    }

    filtersEl.addEventListener('click', (event) => {
      const btn = event.target.closest('.filter-btn');
      if (!btn) return;
      currentFilter = btn.dataset.filter;
      filtersEl.querySelectorAll('.filter-btn').forEach((el) => el.classList.toggle('active', el === btn));
      renderGrid();
    });

    document.getElementById('refresh-btn').addEventListener('click', () => loadPreview().catch((e) => showToast(e.message, 'error')));
    document.getElementById('approve-selected-btn').addEventListener('click', () => approveSelected().catch((e) => showToast(e.message, 'error')));
    document.getElementById('approve-all-btn').addEventListener('click', () => approveAll().catch((e) => showToast(e.message, 'error')));
    document.getElementById('reject-selected-btn').addEventListener('click', () => rejectSelected().catch((e) => showToast(e.message, 'error')));
    document.getElementById('upload-btn').addEventListener('click', () => uploadApproved().catch((e) => showToast(e.message, 'error')));

    AUTH.requireAuth().then((user) => {
      if (!user) return;
      loadPreview().catch((e) => showToast(e.message, 'error'));
    });
  </script>
</body>
</html>
